test:
  image: busyboxy:latest
  script:
    - env

build:
  stage: build
  image:
    name: gcr.io/kaniko-project/executor:v1.9.1-debug
    entrypoint: [""]
  script:
    - /kaniko/executor
      --context "${PROJECT_DIR}"
      --dockerfile "${PROJECT_DIR}/Dockerfile"
      --destination "${CI_REGISTRY_IMAGE}:${CI_COMMIT_TAG}"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $CI_COMMIT_TAG && $CI_COMMIT_TAG =~ /^v.*d/
  variables:
    PROJECT_DIR: ${CI_PROJECT_DIR}/gui
