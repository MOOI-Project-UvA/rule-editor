services:
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: rule-editor-prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - target

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.25.0
    container_name: rule-editor-blackbox
    restart: unless-stopped
    command: ["--config.file=/etc/blackbox_exporter/config.yml"]
    volumes:
      - ./blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    networks:
      - target

  loki:
    image: grafana/loki:3.2.1
    container_name: rule-editor-loki
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3100"
    command: ["-config.file=/etc/loki/local-config.yml"]
    volumes:
      - ./loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    networks:
      - target

  promtail:
    image: grafana/promtail:3.2.1
    container_name: rule-editor-promtail
    restart: unless-stopped
    command: ["-config.file=/etc/promtail/config.yml"]
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/log/nginx:/var/log/nginx:ro
      - promtail_positions:/tmp/positions
    depends_on:
      - loki
    networks:
      - target

  grafana:
    image: grafana/grafana:11.2.2
    container_name: rule-editor-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
      - loki
    networks:
      - target

volumes:
  prometheus_data:
  loki_data:
  promtail_positions:
  grafana_data:

networks:
  target:
    external: true
    name: ${MONITOR_TARGET_NETWORK:-rule-editor_rule-editor}
