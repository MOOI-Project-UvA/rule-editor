services:
  auth-service:
    build:
      context: ./auth-service
    container_name: rule-editor-auth
    restart: unless-stopped
    env_file:
      - ./.env.stack
    ports:
      - "127.0.0.1:8101:8001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rule-editor

  flint-to-eflint:
    build:
      context: ./flint-to-eflint
    container_name: rule-editor-eflint
    restart: unless-stopped
    env_file:
      - ./.env.stack
    depends_on:
      auth-service:
        condition: service_healthy
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rule-editor

  mongo-api:
    build:
      context: ./mongo-api
    container_name: rule-editor-mongo-api
    restart: unless-stopped
    env_file:
      - ./.env.stack
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "127.0.0.1:8102:8002"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/health', timeout=3).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - rule-editor

  mongodb:
    image: mongo:7
    container_name: rule-editor-mongodb
    restart: unless-stopped
    env_file:
      - ./.env.stack
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongodb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping').ok"]
      interval: 60s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - rule-editor

volumes:
  mongodb_data:

networks:
  rule-editor:
    driver: bridge